services:
  backend-dev:
    container_name: backend-dev
    image: ${BACKEND_IMAGE_DEV}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.dev.backend
    ports:
      - "${BACKEND_DEV_HOST_PORT:-8080}:${BACKEND_DEV_CONTAINER_PORT:-8080}"
    depends_on:
      - db-dev
      - nats-dev
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${BACKEND_DEV_CONTAINER_PORT:-8080}/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 3

    networks:
      - heapdog-network-dev

  db-dev:
    container_name: db-dev
    image: postgres:18.0-alpine3.22
    env_file:
      - .env.dev.db
    volumes:
      - db_data_dev:/var/lib/postgresql/data
    ports:
      - "${DB_DEV_HOST_PORT:-5432}:${DB_DEV_CONTAINER_PORT:-5432}"
    networks:
      - heapdog-network-dev

  nats-dev:
    container_name: nats-dev
    image: nats:2.12.2-alpine3.22
    ports:
      - "${NATS_DEV_HOST_PORT:-4222}:${NATS_DEV_CONTAINER_PORT:-4222}"
      - "${NATS_DEV_HTTP_HOST_PORT:-8222}:${NATS_DEV_HTTP_CONTAINER_PORT:-8222}"
    networks:
      - heapdog-network-dev

volumes:
  db_data_dev:

networks:
  heapdog-network-dev:
    external: true
